<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>gerador de tabuada (Método While)</title>
</head>
    <style>

        body {
            font-family: baskerville old face, serif; color: #fff;
            background-color: #000000;
            padding: 20px;
            text-align: center;
            
        }

        .card {
            border: #fff solid 1px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgb(255, 0, 0);
            padding: 20px;
            max-width: 200px;
            margin: auto;
            color: #ffffff;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
        transition: transform 0.3s ease, box-shadow 0.3s ease; /* Transição suave */
        transform: scale(1.1) rotate(2deg);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

    @keyframes float {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-5px); /* Move para cima */
    }
    100% {
        transform: translateY(0px);
    }
}

        button {
            background-color: #6f0b16;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
            display: flex;
            justify-content: center;
            margin: 20px auto;
            
        }

        button:hover {
            background-color: #ab0e21;
            transform: scale(1.05);
        }

        h2 {
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(255, 0, 0, 0.5);
        }
        
        div#resultado {
            margin-top: 20px;
        }

        h3 {
            margin-top: 0;
            box-shadow: 0 2px 5px rgba(255, 0, 0, 0.5);
        }
    </style>



<body>
   
    
    <h2>Gerador de Tabuada (1 ao 10)</h2>

    <label for="numero">Digite um número para gerar a tabuada:</label>
    <input type="number" id="numero" min="1" max="10">
    <button onclick="gerarTabuada()">Gerar Tabuada</button>

    <div id="resultado"></div>

     <script>
        function gerarTabuada() {
            let n = Number(document.getElementById("numero").value);
            let resultado = document.getElementById("resultado");
            let conteudo = "<div class='card'><h3>Tabuada do " + n + "</h3>";

            let i = 1;
            while (i <= 10) {
                conteudo += n + " x " + i + " = " + (n * i) + "<br>";
                i++;
            }

            conteudo += "</div>";
            resultado.innerHTML = conteudo;
        }
    </script>

</body>
</html>
