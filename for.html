<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabuada com Operadores de Atribuição</title>
</head>
<body>

    <h2>Gerador de Tabuada</h2>

    <label>Digite o número que deseja multiplicar:</label>
    <input type="number" id="numTabuada">
    <button onclick="gerarTabuada()">Gerar Tabuada</button>

    <div id="resultado"></div>

    <script>
        function gerarTabuada() {
            // Obtendo o valor de entrada e convertendo para número
            let n = Number(document.getElementById("numTabuada").value);
            let display = document.getElementById("resultado");

            // Inicializando a string de conteúdo (vazia)
            let conteudo = "<h3>Tabuada do " + n + "</h3>";

            // Laço de repetição para calcular de 1 a 10
            for (let i = 1; i <= 10; i++) {
                let resultado = n;

                // Usando o operador de atribuição com multiplicação
                // Isso equivale a: resultado = resultado * i
                resultado *= i;

                // Usando o operador de atribuição com soma para acumular o texto
                // Isso evita que o novo cálculo apague o anterior no HTML
                conteudo += n + " x " + i + " = " + resultado + "<br>";
            }

            // Exibindo o resultado final no documento
            display.innerHTML = conteudo;
        }
    </script>

</body>
</html>
